spring:
  application.name: payment-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/payment_ledger}
    username: ${SPRING_DATASOURCE_USERNAME:ledger}
    password: ${SPRING_DATASOURCE_PASSWORD:ledger_dev_password}
  jpa:
    hibernate.ddl-auto: validate
    open-in-view: false
  flyway.enabled: true
server:
  port: ${PORT:8080}
  max-http-request-header-size: 16KB
management.endpoints.web.exposure.include: health,info
logging.structured.format.console: logstash
app:
  cors-allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  seed-data-enabled: ${SEED_DATA_ENABLED:false}
