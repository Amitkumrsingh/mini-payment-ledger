name: CI
on:
  push:
  pull_request:
jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: frontend}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
  graphql-api:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: graphql-api}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: graphql-api/package-lock.json}
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
  payment-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: 21, cache: maven}
      - run: ./mvnw verify
        working-directory: payment-service

