services:
  - type: web
    name: amitkumrsingh-mini-ledger-payment
    runtime: docker
    plan: free
    region: singapore
    repo: https://github.com/Amitkumrsingh/mini-payment-ledger.git
    branch: main
    dockerfilePath: ./payment-service/Dockerfile
    dockerContext: ./payment-service
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: render
      - key: DATABASE_HOST
        fromDatabase:
          name: amitkumrsingh-mini-ledger-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: amitkumrsingh-mini-ledger-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: amitkumrsingh-mini-ledger-db
          property: database
      - key: DATABASE_USER
        fromDatabase:
          name: amitkumrsingh-mini-ledger-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: amitkumrsingh-mini-ledger-db
          property: password
      - key: CORS_ALLOWED_ORIGINS
        value: https://amitkumrsingh-mini-ledger.onrender.com
      - key: SEED_DATA_ENABLED
        value: "false"

  - type: web
    name: amitkumrsingh-mini-ledger-graphql
    runtime: docker
    plan: free
    region: singapore
    repo: https://github.com/Amitkumrsingh/mini-payment-ledger.git
    branch: main
    dockerfilePath: ./graphql-api/Dockerfile
    dockerContext: ./graphql-api
    healthCheckPath: /health
    envVars:
      - key: PAYMENT_SERVICE_BASE_URL
        value: https://amitkumrsingh-mini-ledger-payment.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://amitkumrsingh-mini-ledger.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: amitkumrsingh-mini-ledger
    runtime: static
    repo: https://github.com/Amitkumrsingh/mini-payment-ledger.git
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_GRAPHQL_URL
        value: https://amitkumrsingh-mini-ledger-graphql.onrender.com/graphql
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: amitkumrsingh-mini-ledger-db
    plan: free
    region: singapore
    postgresMajorVersion: "16"
    databaseName: payment_ledger
    user: ledger
    ipAllowList: []
